<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <style>
        .pe-settings-item {
            display: flex;
        }
        #pe-ui-container {
            position: fixed;
            bottom: auto;
            right: auto;
            min-width: 260px;
            background: rgba(30, 30, 30, 0.9);
            color: white;
            border-radius: 4px;
            padding: 3px 4px;
            z-index: 10000;
            cursor: grab;
            user-select: none;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        #pe-ui-container:active #pe-ui-title {
            cursor: grabbing;
        }
        #pe-settings-container {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            gap: 10px;
            min-height: 120px;
        }
        #pe-ui-title {
            font-weight: bold;
            text-align: center;
            font-size: 0.8em;
            letter-spacing: 0.3px;
            background: #0a3c95;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            cursor: grab;
            user-select: none;
        }
    </style>
    <body>
        <div id="pe-ui-container">
            <div id="pe-ui-title">Prolific Enhancer Settings</div>
            <div id="pe-settings-container">
                <div id="pe-setting-item">
                    <div>Label</div>
                    <button>Setting</button>
                </div>
            </div>
        </div>
    </body>
</html>
